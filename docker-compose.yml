services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hwdb
      POSTGRES_USER: hwdb_admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwdb_admin -d hwdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
